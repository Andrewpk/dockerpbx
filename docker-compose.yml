services:
  freepbx:
    # NO build: block here on purpose. This image takes ~22 minutes to build
    # (the FreePBX installer downloads and installs ~60 modules), which always
    # exceeds Portainer's stack-deploy timeout -- you get DeadlineExceeded.
    # Build it manually on the Pi with ./build.sh, THEN deploy this stack; with
    # no build: block, Portainer just runs the pre-built image and comes up in
    # seconds. See build.sh for the build args (INSTALLER_REF, FREEPBX_DB_PASS).
    image: freepbx-arm64:local
    container_name: freepbx
    restart: unless-stopped

    # The asterisk artifact the installer downloads is arm64-only. Making the
    # platform explicit turns a build on an amd64 box into an immediate, honest
    # error (or a qemu build, if binfmt is set up) instead of a 20-minute build
    # that dies when arm64 binaries won't exec. Build this on the Pi.
    platform: linux/arm64

    # SIP and RTP need real source addresses. Bridge networking breaks IP-based
    # trunk auth, breaks rtp_symmetric, and makes every fail2ban ban hit the
    # docker gateway instead of the attacker. Non-negotiable.
    #
    # NOTE: you cannot also set `hostname:` while network_mode is host -- Docker
    # rejects the combination. The container inherits the Pi's hostname.
    network_mode: host

    # systemd as PID 1 needs this. Combined with host networking, be honest with
    # yourself about what this is: a VM with extra steps.
    privileged: true
    cgroup: host
    stop_signal: SIGRTMIN+3
    # asterisk.service alone is allowed 30s to stop gracefully, and mariadb
    # still has to flush to an SD card after that. 30s here would let Docker
    # SIGKILL systemd mid-shutdown and hand mariadb a dirty datadir.
    stop_grace_period: 90s

    environment:
      TZ: ${TZ:-Atlantic/Reykjavik}

    tmpfs:
      - /run
      - /run/lock
      - /tmp

    volumes:
      # Named volumes, NOT bind mounts. Docker seeds an empty named volume from
      # the image's contents at that path on first run -- which is exactly how
      # the installed FreePBX + populated MariaDB datadir get out of the image
      # and into persistent storage. Bind mounts do NOT do this and would shadow
      # the install with an empty directory.
      - freepbx_mysql:/var/lib/mysql
      - freepbx_etc:/etc/asterisk
      - freepbx_lib:/var/lib/asterisk
      - freepbx_spool:/var/spool/asterisk
      - freepbx_www:/var/www/html
      - freepbx_logs:/var/log/asterisk
      # FreePBX schedules maintenance/backup jobs in the asterisk user's
      # crontab. Baked entries seed the volume; runtime changes survive.
      - freepbx_cron:/var/spool/cron

volumes:
  freepbx_mysql:
  freepbx_etc:
  freepbx_lib:
  freepbx_spool:
  freepbx_www:
  freepbx_logs:
  freepbx_cron:
